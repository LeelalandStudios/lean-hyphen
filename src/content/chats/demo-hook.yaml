id: demo-hook
type: whatsapp-chat

header:
  title: "🔥 Squad Goals"
  subtitle: "5 members"
  currentTime: "11:47 PM"
  showBack: false
  showMenu: true

settings:
  autoStart: true
  autoScroll: true
  fastForward: true
  defaultMessageDelayMs: auto
  defaultTypingMs: 1200
  defaultTime: "11:47 PM"
  encryptedNotice: true
  inputBar: true

senders:
  Kabir:
    color: "#e542a3"
  Aryan:
    color: "#53bdeb"
  Priya:
    color: "#25d366"

beats:
