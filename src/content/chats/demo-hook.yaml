    sender: Kabir
    text: "guys wake up"
    delayAfterMs: 1600

  - type: typing
    sender: Kabir
    durationMs: 2000

  - type: message
    sender: Kabir
    text: |
      my cousin Rohan. he's 16. he saved up 8 months of birthday money.
      it's gone.
    time: "11:48 PM"
    receipts: true

  - type: pause
    durationMs: 1400

  - type: readReceipts
    target: "it's gone"

  - type: forwarded
    sender: Aryan
    from: "+91 98765 43210 (Unknown)"
    body: |
      You've been selected for a Free Fire Diamond Giveaway!
      Claim now: bit.ly/ff-d1amonds-free
    time: "11:49 PM"

  - type: divider
    label: Today

  - type: link
    sender: Priya
    title: "Spot the Scam"
    url: "leelaland.app/spot-the-scam"
    caption: "Tap each red flag."
    time: "11:50 PM"

  - type: message
    sender: Priya
